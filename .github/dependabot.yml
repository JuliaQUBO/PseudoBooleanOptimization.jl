version: 2
updates:
  - package-ecosystem: "julia"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      root-julia-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "julia"
    directory: "/docs"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "PseudoBooleanOptimization"
    groups:
      docs-julia-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "julia"
    directory: "/benchmark"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "PseudoBooleanOptimization"
    groups:
      benchmark-julia-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
